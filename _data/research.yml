# =============================================================================
# _data/research.yml
# =============================================================================
#
# NOTE: Funded Projects and Student Research are now managed as individual
#       Markdown files in dedicated collections — NOT in this file.
#
# HOW TO UPDATE RESEARCH CONTENT
# ─────────────────────────────────────────────────────────────────────────────
#
# RESEARCH THEME CARDS
#   Each card is its own Markdown file in:
#     _research_themes/
#   Copy _research_themes/_template.md to get started.
#
# FUNDED RESEARCH PROJECTS
#   Each project is its own Markdown file in:
#     _funded_projects/
#   Copy _funded_projects/_template.md to get started.
#   Cards appear in the order set by the `order` front-matter field.
#
# STUDENT RESEARCH
#   Each student entry is its own Markdown file in:
#     _student_research/
#   Copy _student_research/_template.md to get started.
#   Cards appear in the order set by the `order` front-matter field.
#
# =============================================================================
