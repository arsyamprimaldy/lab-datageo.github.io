<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#1a2a1a"/>
  <!-- Slope geometry -->
  <polygon points="0,270 200,270 400,120 600,120 600,270" fill="#3a2a18" opacity="0.7"/>
  <polygon points="0,270 200,270 400,120 600,120 600,270" fill="none" stroke="#8a6a40" stroke-width="1.5"/>
  <!-- Slip circle -->
  <path d="M 80 270 Q 120 180 200 160 Q 280 140 330 170 Q 380 200 360 260" 
        fill="none" stroke="#e05030" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Slices for limit equilibrium -->
  <line x1="150" y1="200" x2="150" y2="270" stroke="#f0a500" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="185" x2="200" y2="270" stroke="#f0a500" stroke-width="1.5" opacity="0.7"/>
  <line x1="250" y1="175" x2="250" y2="270" stroke="#f0a500" stroke-width="1.5" opacity="0.7"/>
  <line x1="300" y1="170" x2="300" y2="270" stroke="#f0a500" stroke-width="1.5" opacity="0.7"/>
  <!-- Force arrows on slices -->
  <line x1="175" y1="225" x2="175" y2="200" stroke="#4dd9a0" stroke-width="2"/>
  <polygon points="175,200 171,210 179,210" fill="#4dd9a0"/>
  <line x1="225" y1="220" x2="225" y2="195" stroke="#4dd9a0" stroke-width="2"/>
  <polygon points="225,195 221,205 229,205" fill="#4dd9a0"/>
  <line x1="275" y1="215" x2="275" y2="190" stroke="#4dd9a0" stroke-width="2"/>
  <polygon points="275,190 271,200 279,200" fill="#4dd9a0"/>
  <!-- Water table -->
  <path d="M 0 230 Q 100 220 200 215 Q 280 210 350 220 Q 420 228 500 225 Q 550 223 600 226" 
        fill="none" stroke="#4a90d9" stroke-width="2" stroke-dasharray="10,4"/>
  <text x="520" y="215" fill="#4a90d9" font-family="sans-serif" font-size="11">WT</text>
  <!-- Safety factor label -->
  <rect x="420" y="130" width="130" height="44" rx="4" fill="#052049" opacity="0.85"/>
  <text x="485" y="148" fill="#ccc" font-family="sans-serif" font-size="11" text-anchor="middle">Factor of Safety</text>
  <text x="485" y="167" fill="#4dd9a0" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">FS = 1.42</text>
</svg>
