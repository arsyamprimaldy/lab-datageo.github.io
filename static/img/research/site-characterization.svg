<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#1a3a2a"/>
  <!-- Ground layers -->
  <rect x="0" y="200" width="600" height="20" fill="#5a4a30" opacity="0.7"/>
  <rect x="0" y="220" width="600" height="20" fill="#4a3a25" opacity="0.7"/>
  <rect x="0" y="240" width="600" height="30" fill="#3a2a18" opacity="0.7"/>
  <rect x="0" y="270" width="600" height="30" fill="#2a1a10" opacity="0.8"/>
  <!-- CPT/borehole symbols -->
  <rect x="100" y="80" width="8" height="125" fill="#e0e0e0" rx="2"/>
  <polygon points="100,205 108,205 104,220" fill="#e0e0e0"/>
  <!-- Measurement wave lines -->
  <path d="M 120 120 Q 150 110 180 125 Q 210 140 240 120 Q 270 100 300 115 Q 330 130 360 118" 
        fill="none" stroke="#4dd9a0" stroke-width="2.5"/>
  <path d="M 120 150 Q 150 160 180 148 Q 210 136 240 152 Q 270 168 300 155 Q 330 142 360 158" 
        fill="none" stroke="#4dd9a0" stroke-width="2" opacity="0.7"/>
  <!-- Data points / sensors -->
  <circle cx="200" cy="90" r="5" fill="#f0a500"/>
  <circle cx="300" cy="95" r="5" fill="#f0a500"/>
  <circle cx="400" cy="88" r="5" fill="#f0a500"/>
  <circle cx="480" cy="92" r="5" fill="#f0a500"/>
  <!-- Vertical profiling lines -->
  <line x1="200" y1="80" x2="200" y2="200" stroke="#f0a500" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="300" y1="80" x2="300" y2="200" stroke="#f0a500" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="400" y1="80" x2="400" y2="200" stroke="#f0a500" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Label -->
  <text x="480" y="50" fill="#4dd9a0" font-family="sans-serif" font-size="13" text-anchor="end" opacity="0.9">In-situ Testing</text>
  <text x="480" y="68" fill="#aaa" font-family="sans-serif" font-size="11" text-anchor="end" opacity="0.8">CPT · SPT · DMT · PMT</text>
</svg>
